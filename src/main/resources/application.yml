spring:
  application:
    name: gold-price-alert
  config:
    import: optional:file:${GOLD_SECRET_CONFIG:/data/profiles/mail-secrets.yml}
  datasource:
    url: jdbc:mysql://${GOLD_DB_HOST:10.140.0.2}:${GOLD_DB_PORT:3306}/${GOLD_DB_NAME:alert}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${GOLD_DB_USERNAME:root}
    password: ${GOLD_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.163.com
    port: 465
    username: ${GOLD_MAIL_USERNAME:}
    password: ${GOLD_MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.auth: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000
  data:
    redis:
      host: ${GOLD_REDIS_HOST:10.140.0.2}
      port: ${GOLD_REDIS_PORT:6379}
      password: ${GOLD_REDIS_PASSWORD:}
      database: ${GOLD_REDIS_DATABASE:0}
      timeout: ${GOLD_REDIS_TIMEOUT:5s}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

gold:
  api-url: https://api.gold-api.com/price/XAU/USD
  fetch-interval: 60s
  log-dir: ${GOLD_LOG_DIR:/app/logs}
  auth:
    session-ttl: ${GOLD_AUTH_SESSION_TTL:1h}
  ai:
    api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/chat/completions}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    thinking: ${DEEPSEEK_THINKING:disabled}
    temperature: ${DEEPSEEK_TEMPERATURE:0.4}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:2048}
    timeout: ${DEEPSEEK_TIMEOUT:60s}
    max-history-messages: ${GOLD_AI_MAX_HISTORY_MESSAGES:20}
    recent-snapshot-limit: ${GOLD_AI_RECENT_SNAPSHOT_LIMIT:5}
    max-user-message-length: ${GOLD_AI_MAX_USER_MESSAGE_LENGTH:4000}
  alert:
    window:
      levels:
        INFO_LEVEL: 1m
        MINOR_LEVEL: 5m
        MODERATE_LEVEL: 15m
        MAJOR_LEVEL: 60m
        CRITICAL_LEVEL: 60m
    mail:
      sender: ${GOLD_MAIL_SENDER:}
      min-level: ${GOLD_MAIL_MIN_LEVEL:MODERATE_LEVEL}
      cooldowns:
        INFO_LEVEL: ${GOLD_MAIL_COOLDOWN_INFO:30m}
        MINOR_LEVEL: ${GOLD_MAIL_COOLDOWN_MINOR:15m}
        MODERATE_LEVEL: ${GOLD_MAIL_COOLDOWN_MODERATE:10m}
        MAJOR_LEVEL: ${GOLD_MAIL_COOLDOWN_MAJOR:5m}
        CRITICAL_LEVEL: ${GOLD_MAIL_COOLDOWN_CRITICAL:0m}
